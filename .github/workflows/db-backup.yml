name: DB Backup

# Scheduled logical backup of the production Neon database — an off-Neon safety
# net that survives even if the Neon project itself is lost. Runs daily and can
# be triggered by hand from the Actions tab.
#
# Required repository secret:
#   DATABASE_URL_PROD   — production Neon connection string (pooled or direct).

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch: {}

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Dump production database
    runs-on: ubuntu-latest
    # `secrets` can't be used in an `if:` expression, so surface the one we
    # branch on as an env var (empty when the secret is unset) and test that.
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships an older client (pg16); Neon runs pg18. pg_dump must
      # be >= the server, so install the pg18 client from the PGDG repo.
      - name: Install PostgreSQL 18 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Create dump
        id: dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          # Pin the exact client so PATH ordering can't pick an older pg_dump.
          PG_DUMP: /usr/lib/postgresql/18/bin/pg_dump
        run: ./scripts/backup-db.sh backups

      - name: Upload to Cloudflare R2
        if: ${{ env.R2_ENDPOINT != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
          FILE: ${{ steps.dump.outputs.file }}
        run: |
          aws s3 cp "$FILE" "s3://$R2_BACKUP_BUCKET/db/$(basename "$FILE")" \
            --endpoint-url "$R2_ENDPOINT"

      # Fallback / extra copy: keep the dump as a workflow artifact.
      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/*.sql.gz
          retention-days: 30
          if-no-files-found: error
